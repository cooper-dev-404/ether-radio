<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Dark walnut body gradient -->
    <radialGradient id="body" cx="42%" cy="36%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2E1608"/>
      <stop offset="55%"  stop-color="#1A0A03"/>
      <stop offset="100%" stop-color="#0A0401"/>
    </radialGradient>

    <!-- Amber centre glow -->
    <radialGradient id="glow" cx="50%" cy="58%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FF9500" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FF9500" stop-opacity="0"/>
    </radialGradient>

    <!-- Transmitter dot gradient -->
    <radialGradient id="dot" cx="38%" cy="32%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFE080"/>
      <stop offset="45%"  stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#C05800"/>
    </radialGradient>

    <!-- Rim bevel highlight -->
    <linearGradient id="rim" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#7A5020" stop-opacity="0.9"/>
      <stop offset="45%"  stop-color="#3A1E06" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#200E02" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow filter for the arcs -->
    <filter id="arcglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow for main disc -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <!-- ── Outer disc shadow ── -->
  <circle cx="32" cy="33" r="30" fill="#000" opacity="0.4" filter="url(#shadow)"/>

  <!-- ── Main disc body ── -->
  <circle cx="32" cy="32" r="30" fill="url(#body)"/>

  <!-- ── Rim ring (bevel illusion) ── -->
  <circle cx="32" cy="32" r="29.5" fill="none"
          stroke="url(#rim)" stroke-width="1.2"/>

  <!-- ── Inner highlight crescent (top-left) ── -->
  <ellipse cx="24" cy="20" rx="9" ry="5"
           fill="white" opacity="0.04" transform="rotate(-30 24 20)"/>

  <!-- ── Amber glow behind arcs ── -->
  <circle cx="32" cy="32" r="26" fill="url(#glow)"/>

  <!-- ════════════════════════════════════
       RADIO BROADCAST WAVES — 3 arcs
       Origin point: bottom-centre (32, 44)
       Opening upward, amber to dark amber
       ════════════════════════════════════ -->

  <!-- Wave 3 — outermost, faintest -->
  <path d="M 12 32 A 22 22 0 0 1 52 32"
        fill="none"
        stroke="#C06800" stroke-width="2" stroke-linecap="round"
        opacity="0.40"
        filter="url(#arcglow)"/>

  <!-- Wave 2 — middle -->
  <path d="M 17 32 A 16 16 0 0 1 47 32"
        fill="none"
        stroke="#E88000" stroke-width="2.4" stroke-linecap="round"
        opacity="0.68"
        filter="url(#arcglow)"/>

  <!-- Wave 1 — innermost, brightest -->
  <path d="M 22 32 A 10 10 0 0 1 42 32"
        fill="none"
        stroke="#FF9A00" stroke-width="2.8" stroke-linecap="round"
        opacity="0.92"
        filter="url(#arcglow)"/>

  <!-- ── Transmitter / source dot ── -->
  <!-- Outer ring glow -->
  <circle cx="32" cy="44" r="5.5" fill="#FF8800" opacity="0.22"/>
  <!-- Main dot -->
  <circle cx="32" cy="44" r="3.8" fill="url(#dot)"/>
  <!-- Specular highlight -->
  <circle cx="30.8" cy="42.8" r="1.1" fill="white" opacity="0.35"/>

  <!-- ── Subtle horizontal hairline rule below arcs ── -->
  <line x1="14" y1="39" x2="50" y2="39"
        stroke="#8A5500" stroke-width="0.5" opacity="0.25"/>

  <!-- ── "ER" micro-brand in bottom portion ── -->
  <text x="32" y="58"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="7.5"
        fill="#C89040"
        text-anchor="middle"
        letter-spacing="2.5"
        opacity="0.75">ER</text>

  <!-- ── Top highlight hairline (gives disc a 3-D feel) ── -->
  <path d="M 12 22 A 22 22 0 0 1 52 22"
        fill="none" stroke="white" stroke-width="0.6" opacity="0.06"/>
</svg>
